server {
    server_name syedasif27.duckdns.org;

    root /var/www/html;
    index index.html;

    # Serve portfolio
    location / {
        try_files $uri $uri/ =404;
    }

    location /send-mail {
    # Handle CORS preflight (OPTIONS) — must be before proxy_pass
    if ($request_method = 'OPTIONS') {
        add_header 'Access-Control-Allow-Origin'  'https://syedasif27.github.io' always;
        add_header 'Access-Control-Allow-Methods' 'POST, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type' always;
        add_header 'Access-Control-Max-Age'       '86400' always;
        add_header 'Content-Length' '0';
        add_header 'Content-Type'   'text/plain';
        return 204;
    }

    # Add CORS headers to actual POST response too
    add_header 'Access-Control-Allow-Origin'  'https://syedasif27.github.io' always;
    add_header 'Access-Control-Allow-Methods' 'POST, OPTIONS' always;
    add_header 'Access-Control-Allow-Headers' 'Content-Type' always;

    proxy_pass         http://127.0.0.1:3000/send-mail;
    proxy_http_version 1.1;
    proxy_set_header   Host            $host;
    proxy_set_header   X-Real-IP       $remote_addr;
    proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_read_timeout 10s;
}
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/syedasif27.duckdns.org/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/syedasif27.duckdns.org/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}
server {
    if ($host = syedasif27.duckdns.org) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    server_name syedasif27.duckdns.org;
    return 404; # managed by Certbot
}

